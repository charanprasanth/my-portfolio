<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Charan Prasanth — Mobile Engineer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --surface2: #161616;
      --surface3: #1c1c1c;
      --border: #222;
      --border2: #2a2a2a;
      --text: #fff;
      --text2: #aaa;
      --text3: #555;
      --accent: #6366f1;
      --accent2: #818cf8;
    }

    html,
    body {
      width: 100%;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* ── DESKTOP-ONLY NAV ITEMS (GH+LI in sidebar) ── */
    .desktop-only-nav {
      display: none !important;
    }

    .mode-desktop .desktop-only-nav {
      display: flex !important;
    }

    /* ── NAMEPLATE (top of screen, above device) ── */
    .nameplate {
      position: fixed;
      top: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 12px;
      pointer-events: none;
      opacity: 0;
      animation: npFadeUp 0.9s 1.0s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .nameplate-pic {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255, 255, 255, 0.18);
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
    }

    .nameplate-text {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .nameplate-name {
      font-size: clamp(16px, 1.6vw, 20px);
      font-weight: 600;
      color: rgba(255, 255, 255, 0.9);
      letter-spacing: -0.4px;
      line-height: 1;
      white-space: nowrap;
    }

    .nameplate-role {
      font-size: clamp(10px, 0.9vw, 12px);
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 2.5px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    @keyframes npFadeUp {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(-8px);
      }

      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    /* ── BACKGROUND CANVAS ── */
    #bgCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* ── STAGE ── */
    .stage {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 100vh;
      z-index: 1;
      gap: 0;
    }

    /* ── PHONE WRAP ── */
    .phone-wrap {
      position: relative;
      z-index: 10;
      will-change: transform;
    }

    /* ── PHONE ── */
    .phone {
      width: 300px;
      background: linear-gradient(160deg, #1e1e1e, #141414);
      border-radius: 50px;
      border: 1.5px solid #2a2a2a;
      padding: 14px;
      position: relative;
      transition: box-shadow 0.3s;
      box-shadow:
        0 0 0 1px #111,
        0 60px 120px rgba(0, 0, 0, 0.9),
        0 20px 40px rgba(0, 0, 0, 0.6);
    }

    .phone-inner {
      background: #000;
      border-radius: 38px;
      overflow: hidden;
      position: relative;
      height: 620px;
    }

    .notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 30px;
      background: #1e1e1e;
      border-radius: 0 0 20px 20px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .notch-camera {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #111;
      border: 1.5px solid #2a2a2a;
    }

    .notch-speaker {
      width: 40px;
      height: 4px;
      border-radius: 2px;
      background: #1a1a1a;
    }

    /* side buttons */
    .phone::before {
      content: '';
      position: absolute;
      right: -3px;
      top: 100px;
      width: 3px;
      height: 36px;
      background: #222;
      border-radius: 0 3px 3px 0;
    }

    .phone::after {
      content: '';
      position: absolute;
      left: -3px;
      top: 80px;
      width: 3px;
      height: 28px;
      background: #222;
      border-radius: 3px 0 0 3px;
      box-shadow: 0 40px 0 #222, 0 70px 0 #222;
    }

    /* ── HOMESCREEN ── */
    .homescreen {
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at 60% 20%, #12122a 0%, #090912 60%, #080808 100%);
      display: flex;
      flex-direction: column;
      padding: 38px 18px 22px;
      position: relative;
      overflow: hidden;
    }

    .hs-glow {
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.1) 0%, transparent 70%);
      top: -80px;
      right: -60px;
      pointer-events: none;
    }

    .hs-glow2 {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.06) 0%, transparent 70%);
      bottom: 100px;
      left: -40px;
      pointer-events: none;
    }

    /* status */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 22px;
      padding: 0 4px;
    }

    .status-time {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.3px;
    }

    .status-right {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .sig {
      display: flex;
      align-items: flex-end;
      gap: 1.5px;
      height: 12px;
    }

    .sig span {
      display: block;
      width: 3px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 1px;
    }

    .sig span:nth-child(1) {
      height: 4px;
      opacity: 0.4;
    }

    .sig span:nth-child(2) {
      height: 7px;
      opacity: 0.7;
    }

    .sig span:nth-child(3) {
      height: 10px;
    }

    .sig span:nth-child(4) {
      height: 12px;
    }

    .batt-icon {
      width: 22px;
      height: 11px;
      border: 1.5px solid rgba(255, 255, 255, 0.6);
      border-radius: 2.5px;
      position: relative;
      margin-left: 4px;
    }

    .batt-icon::after {
      content: '';
      position: absolute;
      left: 2px;
      top: 1.5px;
      bottom: 1.5px;
      right: 3px;
      background: #fff;
      border-radius: 1px;
    }

    .batt-icon::before {
      content: '';
      position: absolute;
      right: -5px;
      top: 2.5px;
      width: 2px;
      height: 5px;
      background: rgba(255, 255, 255, 0.4);
      border-radius: 0 1px 1px 0;
    }

    /* profile */
    .avatar {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin: 0 auto 10px;
      position: relative;
    }

    .avatar::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.5), rgba(139, 92, 246, 0.5));
      z-index: -1;
    }

    .p-name {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.3px;
    }

    .p-role {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 1.5px;
      margin-top: 3px;
      text-transform: uppercase;
    }

    /* ── APP GRID ── */
    .app-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px 8px;
    }

    .app {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }

    .app-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .app-icon::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.12) 0%, transparent 60%);
      pointer-events: none;
    }

    .app:hover .app-icon {
      transform: scale(1.12);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
    }

    .app:active .app-icon {
      transform: scale(0.92);
    }

    .app-label {
      font-size: 9.5px;
      color: rgba(255, 255, 255, 0.65);
      text-align: center;
      font-weight: 400;
      letter-spacing: 0.1px;
    }

    /* active indicator */
    .app.active .app-icon {
      box-shadow: 0 0 0 2px var(--accent), 0 8px 24px rgba(99, 102, 241, 0.4);
    }

    /* icon colors */
    .ic-about {
      background: linear-gradient(145deg, #7c3aed, #6366f1);
    }

    .ic-exp {
      background: linear-gradient(145deg, #2563eb, #0ea5e9);
    }

    .ic-proj {
      background: linear-gradient(145deg, #d97706, #f59e0b);
    }

    .ic-skills {
      background: linear-gradient(145deg, #059669, #10b981);
    }

    .ic-edu {
      background: linear-gradient(145deg, #9333ea, #c026d3);
    }

    .ic-cert {
      background: linear-gradient(145deg, #b45309, #d97706);
    }

    .ic-awards {
      background: linear-gradient(145deg, #dc2626, #ef4444);
    }

    .ic-contact {
      background: linear-gradient(145deg, #0d9488, #14b8a6);
    }

    .ic-gh {
      background: #161b22;
      border: 1px solid #30363d;
    }

    .ic-li {
      background: linear-gradient(145deg, #005e8b, #0077b5);
    }

    /* ── SPACER ROW ── */
    .grid-spacer {
      height: 12px;
    }

    /* ── HIDE PROFILE inside device in phone/tablet mode ── */
    /* Profile only shows in desktop sidebar; nameplate outside handles it in phone/tablet */
    .mode-desktop

    /* ── PROFILE: hidden everywhere, only shown in desktop sidebar ── */
    .profile {
      display: none !important;
    }

    /* ── DOCK ICON ── */
    .dock-icon {
      width: 50px;
      height: 50px;
      border-radius: 14px;
    }

    .mode-desktop .dock-icon {
      width: 34px;
      height: 34px;
      border-radius: 9px;
    }

    .mode-desktop .dock-icon svg {
      width: 16px;
      height: 16px;
    }

    /* ── DOCK ── */
    .dock {
      display: flex;
      justify-content: center;
      gap: 16px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 26px;
      padding: 12px 20px;
      margin-top: auto;
      border: 0.5px solid rgba(255, 255, 255, 0.08);
    }

    /* ── PANEL ── */
    .panel-overlay {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
    }

    .panel {
      position: absolute;
      top: 50%;
      width: 420px;
      max-height: 600px;
      background: #111;
      border-radius: 24px;
      border: 1px solid #1e1e1e;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8), 0 0 0 0.5px #1e1e1e;
      transition: opacity 0.38s cubic-bezier(0.4, 0, 0.2, 1), transform 0.42s cubic-bezier(0.34, 1.18, 0.64, 1);
    }

    .panel.side-right {
      left: calc(50% + 108px);
      transform: translateY(-50%) translateX(18px) scale(0.92);
      transform-origin: left center;
    }

    .panel.side-left {
      right: calc(50% + 108px);
      transform: translateY(-50%) translateX(-18px) scale(0.92);
      transform-origin: right center;
    }

    .panel.open {
      opacity: 1;
      pointer-events: all;
    }

    .panel.side-right.open {
      transform: translateY(-50%) translateX(0) scale(1);
    }

    .panel.side-left.open {
      transform: translateY(-50%) translateX(0) scale(1);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 22px 16px;
      border-bottom: 0.5px solid #1a1a1a;
      flex-shrink: 0;
    }

    .panel-title-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .panel-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .panel-title {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.3px;
    }

    .close-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #1a1a1a;
      border: 0.5px solid #2a2a2a;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.2s, color 0.2s, transform 0.15s;
      flex-shrink: 0;
    }

    .close-btn:hover {
      background: #222;
      color: #fff;
      transform: rotate(90deg);
    }

    .panel-body {
      padding: 18px 22px;
      overflow-y: auto;
      flex: 1;
    }

    .panel-body::-webkit-scrollbar {
      width: 3px;
    }

    .panel-body::-webkit-scrollbar-thumb {
      background: #2a2a2a;
      border-radius: 2px;
    }

    /* ── PANEL CONTENT ── */
    .p-section {
      margin-bottom: 20px;
    }

    .p-label {
      font-size: 9.5px;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .p-text {
      font-size: 13px;
      color: #999;
      line-height: 1.75;
      font-weight: 300;
    }

    .p-text strong {
      color: #ddd;
      font-weight: 500;
    }

    /* exp cards */
    .xp-card {
      background: #161616;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      border: 0.5px solid #1e1e1e;
      transition: border-color 0.2s;
    }

    .xp-card:hover {
      border-color: #2a2a2a;
    }

    .xp-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .xp-role {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.2px;
    }

    .xp-date {
      font-size: 10px;
      color: #444;
      font-weight: 400;
      white-space: nowrap;
      margin-left: 8px;
      padding-top: 2px;
    }

    .xp-co {
      font-size: 11px;
      color: var(--accent2);
      letter-spacing: 0.3px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .xp-loc {
      font-size: 10px;
      color: #444;
      margin-bottom: 10px;
    }

    .xp-bullet {
      font-size: 12px;
      color: #777;
      line-height: 1.65;
      padding-left: 14px;
      position: relative;
      margin-bottom: 5px;
    }

    .xp-bullet::before {
      content: '';
      position: absolute;
      left: 0;
      top: 8px;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #2a2a2a;
    }

    /* project cards */
    .proj-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .proj-card {
      background: #161616;
      border-radius: 14px;
      padding: 14px;
      border: 0.5px solid #1e1e1e;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: border-color 0.2s, transform 0.2s;
      cursor: default;
    }

    .proj-card:hover {
      border-color: #2a2a2a;
      transform: translateY(-2px);
    }

    .proj-app-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .proj-app-icon::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    .proj-name {
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.2px;
    }

    .proj-stack {
      font-size: 9.5px;
      color: #444;
      letter-spacing: 0.2px;
      line-height: 1.5;
    }

    .proj-desc {
      font-size: 11px;
      color: #666;
      line-height: 1.6;
      flex: 1;
    }

    .proj-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      color: var(--accent2);
      text-decoration: none;
      font-weight: 500;
      margin-top: 4px;
      transition: color 0.2s;
    }

    .proj-link:hover {
      color: #a5b4fc;
    }

    /* skills */
    .skill-group {
      margin-bottom: 16px;
    }

    .skill-group-lbl {
      font-size: 9.5px;
      color: #444;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .tag {
      font-size: 11px;
      padding: 4px 10px;
      background: #161616;
      border: 0.5px solid #252525;
      border-radius: 100px;
      color: #888;
      transition: border-color 0.2s, color 0.2s;
      cursor: default;
    }

    .tag:hover {
      border-color: var(--accent);
      color: var(--accent2);
    }

    /* edu */
    .edu-card {
      background: #161616;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 10px;
      border: 0.5px solid #1e1e1e;
    }

    .edu-badge {
      display: inline-block;
      font-size: 9px;
      padding: 3px 8px;
      border-radius: 100px;
      margin-bottom: 10px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .edu-badge.current {
      background: rgba(99, 102, 241, 0.15);
      color: var(--accent2);
    }

    .edu-badge.past {
      background: #1a1a1a;
      color: #555;
    }

    .edu-school {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.2px;
      margin-bottom: 4px;
    }

    .edu-deg {
      font-size: 12px;
      color: #888;
    }

    .edu-meta {
      font-size: 10px;
      color: #444;
      margin-top: 5px;
    }

    /* certs */
    .cert-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 0.5px solid #161616;
    }

    .cert-item:last-child {
      border-bottom: none;
    }

    .cert-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      margin-top: 5px;
    }

    .cert-text {
      font-size: 12px;
      color: #888;
      line-height: 1.5;
    }

    /* awards */
    .award-card {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: #161616;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
      border: 0.5px solid #1e1e1e;
    }

    .award-ico {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .award-title {
      font-size: 13px;
      font-weight: 500;
      color: #ddd;
      margin-bottom: 4px;
    }

    .award-sub {
      font-size: 11px;
      color: #666;
      line-height: 1.5;
    }

    /* contact */
    .contact-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 0.5px solid #161616;
    }

    .contact-row:last-child {
      border-bottom: none;
    }

    .contact-ico {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .contact-platform {
      font-size: 10px;
      color: #555;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .contact-val {
      font-size: 13px;
      color: var(--accent2);
      text-decoration: none;
      margin-top: 2px;
      display: block;
      transition: color 0.2s;
    }

    .contact-val:hover {
      color: #a5b4fc;
    }

    /* ── BOTTOM SHEET (inside phone) ── */
    .sheet-bg {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 20;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      border-radius: 38px;
    }

    .sheet-bg.open {
      opacity: 1;
      pointer-events: all;
    }

    .sheet {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: #141414;
      border-radius: 24px 24px 0 0;
      border-top: 0.5px solid #252525;
      padding: 0 0 32px;
      transform: translateY(100%);
      transition: transform 0.45s cubic-bezier(0.32, 0.72, 0, 1);
      z-index: 21;
    }

    .sheet.open {
      transform: translateY(0);
    }

    .sheet-handle {
      width: 36px;
      height: 4px;
      background: #2a2a2a;
      border-radius: 2px;
      margin: 12px auto 18px;
    }

    .sheet-inner {
      padding: 0 20px;
    }

    .sheet-title {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 3px;
    }

    .sheet-sub {
      font-size: 11px;
      color: #555;
      margin-bottom: 18px;
    }

    .sheet-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      margin-bottom: 8px;
    }

    .sheet-btn:active {
      transform: scale(0.97);
    }

    .btn-gh {
      background: #161b22;
      color: #fff;
      border: 0.5px solid #30363d;
    }

    .btn-li {
      background: #0077b5;
      color: #fff;
    }

    /* ── ENTRANCE ── */
    @keyframes iconPop {
      0% {
        opacity: 0;
        transform: scale(0.4);
      }

      70% {
        transform: scale(1.1);
      }

      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes fadeSlide {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .app {
      opacity: 0;
    }

    .app.popped {
      animation: iconPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    /* ── RADIAL HINT ── */
    .hint {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: #333;
      letter-spacing: 1px;
      text-transform: uppercase;
      animation: fadeSlide 1s 1.5s forwards;
      opacity: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hint::before,
    .hint::after {
      content: '';
      display: block;
      width: 24px;
      height: 0.5px;
      background: #2a2a2a;
    }

    /* ── DEVICE SWITCHER ── */
    .device-bar {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(14, 14, 14, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 0.5px solid #2a2a2a;
      border-radius: 100px;
      padding: 5px 7px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
    }

    .dv-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 100px;
      border: none;
      cursor: pointer;
      background: transparent;
      color: #555;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.3px;
      transition: background 0.2s, color 0.2s, transform 0.15s;
      white-space: nowrap;
    }

    .dv-btn:hover {
      color: #999;
    }

    .dv-btn:active {
      transform: scale(0.95);
    }

    .dv-btn.active {
      background: #1e1e1e;
      color: #fff;
      box-shadow: 0 0 0 0.5px #333;
    }

    /* device mode transitions */
    .phone {
      transition: width 0.55s cubic-bezier(0.34, 1.1, 0.64, 1),
        border-radius 0.55s cubic-bezier(0.34, 1.1, 0.64, 1),
        padding 0.55s cubic-bezier(0.34, 1.1, 0.64, 1);
    }

    .phone-inner {
      transition: height 0.55s cubic-bezier(0.34, 1.1, 0.64, 1),
        border-radius 0.55s cubic-bezier(0.34, 1.1, 0.64, 1);
    }

    /* ── TABLET MODE ── */
    .mode-tablet .phone {
      width: 560px;
      border-radius: 28px;
      padding: 18px;
    }

    .mode-tablet .phone-inner {
      height: 340px;
      border-radius: 18px;
    }

    .mode-tablet .homescreen {
      padding: 24px 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .mode-tablet .status-bar {
      margin-bottom: 16px;
    }

    .mode-tablet .avatar {
      width: 44px;
      height: 44px;
      font-size: 17px;
      margin-bottom: 6px;
    }

    .mode-tablet .app-grid {
      grid-template-columns: repeat(8, 1fr);
      gap: 8px 6px;
      align-content: center;
      align-self: center;
    }

    .mode-tablet .app-icon {
      width: 42px;
      height: 42px;
      border-radius: 11px;
    }

    .mode-tablet .app-icon svg {
      width: 18px;
      height: 18px;
    }

    .mode-tablet .app-label {
      font-size: 8.5px;
    }

    .mode-tablet .grid-spacer {
      display: none;
    }

    .mode-tablet .dock {
      /* same pill style as mobile, pinned to bottom */
      margin: auto auto 14px;
      padding: 12px 24px;
      border-radius: 26px !important;
      border: 0.5px solid rgba(255, 255, 255, 0.08) !important;
      background: rgba(255, 255, 255, 0.05) !important;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      justify-content: center;
      align-items: center;
      gap: 16px;
      width: fit-content;
    }

    .mode-tablet .notch {
      width: 70px;
      height: 20px;
    }

    .mode-tablet .phone::before {
      right: -3px;
      top: 70px;
      height: 28px;
    }

    .mode-tablet .phone::after {
      left: -3px;
      top: 55px;
      height: 22px;
      box-shadow: 0 32px 0 #222, 0 56px 0 #222;
    }

    .mode-tablet .hs-glow,
    .mode-tablet .hs-glow2 {
      display: none;
    }

    /* ── DESKTOP MODE — real OS window ── */
    .mode-desktop .phone {
      width: 780px;
      border-radius: 12px;
      padding: 0;
      border-width: 1px;
      border-color: #2e2e2e;
    }

    .mode-desktop .phone-inner {
      height: 480px;
      border-radius: 10px;
    }

    .mode-desktop .phone::before,
    .mode-desktop .phone::after {
      display: none;
    }

    .mode-desktop .notch {
      display: none;
    }

    .mode-desktop .hs-glow,
    .mode-desktop .hs-glow2 {
      display: none;
      position: absolute;
    }

    /* nameplate always visible at top — no desktop override needed */
    .mode-desktop .grid-spacer {
      display: none;
    }

    .mode-desktop #app-contact {
      display: none !important;
    }

    /* homescreen = OS window grid: titlebar | sidebar + main | dock */
    .mode-desktop .homescreen {
      padding: 0;
      display: grid;
      grid-template-columns: 200px 1fr;
      grid-template-rows: 36px auto 1fr 50px;
      background: #0e0e0e;
      overflow: hidden;
    }

    /* title bar */
    .mode-desktop .status-bar {
      grid-column: 1/-1;
      grid-row: 1;
      background: #1c1c1c;
      border-bottom: 0.5px solid #282828;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 0;
      position: relative;
    }

    .mode-desktop .status-bar::before {
      content: '';
      width: 54px;
      height: 12px;
      flex-shrink: 0;
      background:
        radial-gradient(circle at 6px 6px, #ff5f57 5.5px, transparent 5.5px),
        radial-gradient(circle at 22px 6px, #febc2e 5.5px, transparent 5.5px),
        radial-gradient(circle at 38px 6px, #28c840 5.5px, transparent 5.5px);
    }

    .mode-desktop .status-time {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      font-weight: 500;
      color: #888;
      letter-spacing: 0;
    }

    .mode-desktop .status-right {
      gap: 6px;
    }

    .mode-desktop .batt-icon {
      margin-left: 0;
    }

    /* dt-sidebar: lives in col1 row2 */
    .dt-sidebar {
      display: none;
    }

    /* hidden in phone/tablet */
    .mode-desktop .dt-sidebar {
      display: flex;
      flex-direction: column;
      grid-column: 1;
      grid-row: 2;
      background: #111;
      border-right: 0.5px solid #1e1e1e;
      border-bottom: 0.5px solid #1a1a1a;
    }


    .mode-desktop .avatar {
      width: 44px;
      height: 44px;
      font-size: 16px;
      margin: 0 0 10px 0;
    }

    .mode-desktop .p-name {
      font-size: 12px;
      font-weight: 600;
      text-align: left;
      letter-spacing: -0.2px;
    }

    .mode-desktop .p-role {
      font-size: 9px;
      text-align: left;
      margin-top: 2px;
      margin-bottom: 0;
    }

    /* app-grid = sidebar nav list */
    .mode-desktop .app-grid {
      grid-column: 1;
      grid-row: 3;
      display: flex;
      flex-direction: column;
      gap: 1px;
      padding: 8px 8px;
      overflow-y: auto;
      grid-template-columns: unset;
      align-self: start;
      padding-top: 0;
    }

    .mode-desktop .app-grid::-webkit-scrollbar {
      width: 0;
    }

    .mode-desktop .app {
      flex-direction: row;
      align-items: center;
      gap: 10px;
      padding: 7px 10px;
      border-radius: 8px;
      width: 100%;
      transition: background 0.15s;
    }

    .mode-desktop .app:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .mode-desktop .app.active {
      background: rgba(99, 102, 241, 0.18);
    }

    .mode-desktop .app-icon {
      width: 26px;
      height: 26px;
      border-radius: 7px;
      flex-shrink: 0;
    }

    .mode-desktop .app-icon svg {
      width: 13px;
      height: 13px;
    }

    .mode-desktop .app-icon::after {
      display: none;
    }

    .mode-desktop .app-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.55);
      text-align: left;
      font-weight: 400;
    }

    .mode-desktop .app.active .app-label {
      color: #fff;
      font-weight: 500;
    }

    .mode-desktop .grid-spacer {
      display: none;
    }

    .mode-desktop #app-contact {
      display: none !important;
    }

    /* dt-main: col2 row2 — inline content panel */
    .dt-main {
      display: none;
    }

    /* hidden in phone/tablet */
    .mode-desktop .dt-main {
      display: flex;
      flex-direction: column;
      grid-column: 2;
      grid-row: 2 / span 2;
      background: #0e0e0e;
      overflow: hidden;
    }

    .dt-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 10px;
      color: #333;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* inline content inside dt-main */
    .dt-content {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
      animation: dtFadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes dtFadeIn {
      from {
        opacity: 0;
        transform: translateX(12px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .dt-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 18px 12px;
      border-bottom: 0.5px solid #1a1a1a;
      flex-shrink: 0;
    }

    .dt-header-icon {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .dt-header-title {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.2px;
    }

    .dt-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px 18px;
    }

    .dt-body::-webkit-scrollbar {
      width: 3px;
    }

    .dt-body::-webkit-scrollbar-thumb {
      background: #222;
      border-radius: 2px;
    }

    /* dock */
    .mode-desktop .dock {
      grid-column: 1/-1;
      grid-row: 4;
      background: #141414;
      border-top: 0.5px solid #1e1e1e;
      border-radius: 0 0 10px 10px;
      justify-content: center;
      align-items: center;
      gap: 12px;
      padding: 8px 14px;
      margin-top: 0;
      backdrop-filter: none;
      width: 100%;
    }

    .mode-desktop .dock .app {
      gap: 0 !important;
    }

    .mode-desktop .dock .dock-icon {
      width: 32px !important;
      height: 32px !important;
      border-radius: 8px !important;
    }

    .mode-desktop .dock .dock-icon svg {
      width: 15px !important;
      height: 15px !important;
    }

    /* in desktop mode, hide the GH+LI dock items — they appear in sidebar nav */
    .mode-desktop .dock .app[data-sheet] {
      display: none !important;
    }

    /* hide dock bar in desktop entirely since contact is in sidebar */
    .mode-desktop .dock {
      display: none !important;
    }

    /* panel offset per mode */
    .mode-tablet .panel.side-right {
      left: calc(50% + 196px);
    }

    .mode-tablet .panel.side-left {
      right: calc(50% + 196px);
    }

    .mode-desktop .panel.side-right {
      left: calc(50% + 370px);
    }

    .mode-desktop .panel.side-left {
      right: calc(50% + 370px);
    }

    /* ── RESPONSIVE — small screens: force phone mode, hide switcher ── */
    @media(max-width:800px) {
      .device-bar {
        display: none !important;
      }

      .mode-tablet .phone,
      .mode-desktop .phone {
        width: 300px !important;
        border-radius: 50px !important;
        padding: 14px !important;
      }

      .mode-tablet .phone-inner,
      .mode-desktop .phone-inner {
        height: 620px !important;
        border-radius: 38px !important;
      }

      .mode-tablet .homescreen,
      .mode-desktop .homescreen {
        display: flex !important;
        flex-direction: column !important;
        padding: 38px 18px 22px !important;
        grid-template-rows: unset !important;
        grid-template-columns: unset !important;
      }

      .mode-desktop .dt-sidebar {
        display: contents !important;
      }

      .mode-desktop .dt-main {
        display: none !important;
      }

      .mode-tablet .app-grid,
      .mode-desktop .app-grid {
        grid-template-columns: repeat(4, 1fr) !important;
        gap: 16px 8px !important;
        padding: 0 !important;
        display: grid !important;
        flex-direction: unset !important;
      }

      .mode-desktop .homescreen {
        grid-template-columns: unset !important;
        grid-template-rows: unset !important;
      }

      .mode-desktop .app {
        flex-direction: column !important;
        padding: 0 !important;
        width: auto !important;
        background: transparent !important;
      }

      .mode-desktop .app-icon {
        width: 52px !important;
        height: 52px !important;
        border-radius: 14px !important;
      }

      .mode-desktop .app-icon svg {
        width: 24px !important;
        height: 24px !important;
      }

      .mode-desktop .app-icon::after {
        display: block !important;
      }

      .mode-desktop .app-label {
        font-size: 9.5px !important;
        text-align: center !important;
        color: rgba(255, 255, 255, 0.65) !important;
      }

      .mode-desktop .profile {
        display: none !important;
      }

      .mode-desktop .status-bar {
        background: transparent !important;
        border: none !important;
        padding: 0 4px !important;
        display: flex !important;
        grid-column: unset !important;
        grid-row: unset !important;
      }

      .mode-desktop .status-bar::before {
        display: none !important;
      }

      .mode-tablet .dock,
      .mode-desktop .dock {
        grid-column: unset !important;
        grid-row: unset !important;
        position: static !important;
        background: rgba(255, 255, 255, 0.05) !important;
        border-radius: 26px !important;
        border: 0.5px solid rgba(255, 255, 255, 0.08) !important;
        left: auto !important;
      }

      .mode-tablet .grid-spacer,
      .mode-desktop .grid-spacer {
        display: block !important;
      }

      .panel.side-right,
      .panel.side-left {
        top: auto !important;
        bottom: 0 !important;
        left: 0 !important;
        right: 0 !important;
        width: 100% !important;
        max-width: 100% !important;
        max-height: 75vh !important;
        border-radius: 24px 24px 0 0 !important;
        transform: translateY(40px) scale(0.96) !important;
        transform-origin: bottom center !important;
      }

      .panel.open {
        transform: translateY(0) scale(1) !important;
      }

      .proj-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

              <div class="app" data-panel="education" id="app-education">

                </div>

  <script>
    // ── CLOCK ──
    function tick() {
      const n = new Date(), h = n.getHours(), m = n.getMinutes();
      const el = document.getElementById('clock');
      if (el) el.textContent = h + ':' + (m < 10 ? '0' + m : m);
    }
    tick(); setInterval(tick, 30000);

    // ── ICON POP ──
    document.querySelectorAll('.app').forEach((a, i) => {
      setTimeout(() => a.classList.add('popped'), 900 + i * 80);
    });

    // ── ANIMATED BACKGROUND CANVAS ──
    (function () {
      const canvas = document.getElementById('bgCanvas');
      const ctx = canvas.getContext('2d');
      let W, H;
      function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
      resize();
      window.addEventListener('resize', resize);

      // orbs
      const orbs = [
        { x: 0.15, y: 0.2, r: 0.38, cr: '#6366f1', speed: 0.0004, phase: 0 },
        { x: 0.85, y: 0.75, r: 0.32, cr: '#8b5cf6', speed: 0.0003, phase: 2.1 },
        { x: 0.5, y: 0.9, r: 0.28, cr: '#06b6d4', speed: 0.0005, phase: 4.2 },
        { x: 0.8, y: 0.1, r: 0.22, cr: '#a855f7', speed: 0.00035, phase: 1.0 },
      ];

      // particles
      const PCNT = 60;
      const pts = Array.from({ length: PCNT }, () => ({
        x: Math.random() * 2 - 1, y: Math.random() * 2 - 1,
        vx: (Math.random() - 0.5) * 0.0004,
        vy: (Math.random() - 0.5) * 0.0004,
        alpha: Math.random() * 0.4 + 0.05,
        size: Math.random() * 1.5 + 0.5
      }));

      let t = 0;
      function drawBg() {
        ctx.clearRect(0, 0, W, H);

        // base
        ctx.fillStyle = '#0a0a0a';
        ctx.fillRect(0, 0, W, H);

        // animated orbs
        orbs.forEach(o => {
          const cx = (o.x + Math.sin(t * o.speed + o.phase) * 0.08) * W;
          const cy = (o.y + Math.cos(t * o.speed * 0.7 + o.phase) * 0.06) * H;
          const r = o.r * Math.min(W, H) * 0.7;
          const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
          g.addColorStop(0, o.cr + '18');
          g.addColorStop(0.4, o.cr + '08');
          g.addColorStop(1, 'transparent');
          ctx.beginPath();
          ctx.arc(cx, cy, r, 0, Math.PI * 2);
          ctx.fillStyle = g;
          ctx.fill();
        });

        // grid lines (subtle, fade with time breathing)
        const gridOpacity = 0.025 + Math.sin(t * 0.0008) * 0.008;
        ctx.strokeStyle = `rgba(99,102,241,${gridOpacity})`;
        ctx.lineWidth = 0.5;
        const gs = 70;
        for (let x = 0; x < W; x += gs) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
        for (let y = 0; y < H; y += gs) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

        // particles
        pts.forEach(p => {
          p.x += p.vx; p.y += p.vy;
          if (p.x > 1) p.x = -1; if (p.x < -1) p.x = 1;
          if (p.y > 1) p.y = -1; if (p.y < -1) p.y = 1;
          const px = (p.x + 1) / 2 * W, py = (p.y + 1) / 2 * H;
          ctx.beginPath();
          ctx.arc(px, py, p.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(130,140,255,${p.alpha})`;
          ctx.fill();
        });

        t++;
        requestAnimationFrame(drawBg);
      }
      drawBg();
    })();

    // ── SPRING PHYSICS MOTION SYSTEM ──
    const phoneWrap = document.getElementById('phoneWrap');
    const phoneEl = document.getElementById('phone');

    // spring state — all values are what we're animating toward
    const spring = {
      // current values
      tx: 0, ty: 0, rx: 0, ry: 0,
      // velocities
      vtx: 0, vty: 0, vrx: 0, vry: 0,
      // targets
      targetTx: 0, targetTy: 0, targetRx: 0, targetRy: 0,
      // entrance drop
      entranceDone: false,
      entranceTy: -140,
      entranceRz: -8,
      currentRz: 0, vRz: 0, targetRz: 0,
    };

    // mouse
    let mouseNX = 0, mouseNY = 0;
    document.addEventListener('mousemove', e => {
      mouseNX = (e.clientX / window.innerWidth - 0.5) * 2;
      mouseNY = (e.clientY / window.innerHeight - 0.5) * 2;
    });

    let isPanelOpen = false;
    let panelSide = null;  // 'left' or 'right'
    let idleT = 0;

    // Spring constant and damping
    const K_POS = 0.055, D_POS = 0.72;   // position spring
    const K_ROT = 0.065, D_ROT = 0.68;   // rotation spring
    const K_ENT = 0.04, D_ENT = 0.75;   // entrance spring

    function springStep(cur, vel, target, k, d) {
      const force = (target - cur) * k;
      vel = (vel + force) * d;
      cur += vel;
      return [cur, vel];
    }

    // phone center X when panel closed vs open
    let panelOpenTarget = false;
    let targetTxPanel = 0;

    function applyTransform() {
      const tx = spring.tx;
      const ty = spring.ty;
      const rx = spring.rx;
      const ry = spring.ry;
      const rz = spring.currentRz;
      phoneWrap.style.transform = `
    translateX(${tx}px)
    translateY(${ty}px)
    perspective(1000px)
    rotateX(${rx}deg)
    rotateY(${ry}deg)
    rotateZ(${rz}deg)
  `;
      // dynamic shadow
      const shadowShiftX = ry * 1.5;
      const shadowShiftY = 40 - rx * 1.5;
      phoneEl.style.boxShadow = `
    0 0 0 1px #111,
    ${shadowShiftX}px ${shadowShiftY}px 80px rgba(0,0,0,0.95),
    0 20px 40px rgba(0,0,0,0.5)
  `;
    }

    let rafId;
    function motionLoop() {
      idleT += 0.012;

      if (!spring.entranceDone) {
        // entrance: spring from above
        [spring.ty, spring.vty] = springStep(spring.ty, spring.vty, 0, K_ENT, D_ENT);
        [spring.currentRz, spring.vRz] = springStep(spring.currentRz, spring.vRz, 0, K_ENT, D_ENT);
        if (Math.abs(spring.ty) < 0.08 && Math.abs(spring.vty) < 0.001) {
          spring.ty = 0; spring.vty = 0;
          spring.currentRz = 0; spring.vRz = 0;
          spring.entranceDone = true;
        }
      } else {
        // idle float on Y when no panel
        const floatY = isPanelOpen ? 0 : Math.sin(idleT) * 7;
        spring.targetTy = floatY;

        // mouse tilt (disabled when panel open)
        if (!isPanelOpen) {
          spring.targetRx = mouseNY * -9;
          spring.targetRy = mouseNX * 11;
        } else {
          spring.targetRx = 2;
          spring.targetRy = -5;
        }

        [spring.ty, spring.vty] = springStep(spring.ty, spring.vty, spring.targetTy, K_POS, D_POS);
        [spring.rx, spring.vrx] = springStep(spring.rx, spring.vrx, spring.targetRx, K_ROT, D_ROT);
        [spring.ry, spring.vry] = springStep(spring.ry, spring.vry, spring.targetRy, K_ROT, D_ROT);
        spring.targetRz = 0;
        [spring.currentRz, spring.vRz] = springStep(spring.currentRz, spring.vRz, spring.targetRz, K_ROT, D_ROT);
      }

      // panel slide X — direction-aware spring
      let txTarget = 0;
      if (isPanelOpen) {
        txTarget = panelSide === 'left' ? 100 : -100;
      }
      [spring.tx, spring.vtx] = springStep(spring.tx, spring.vtx, txTarget, K_POS * 0.9, D_POS);

      // tilt toward open panel
      if (isPanelOpen) {
        spring.targetRy = panelSide === 'left' ? 6 : -6;
      }

      applyTransform();
      requestAnimationFrame(motionLoop);
    }

    // kick off entrance
    spring.ty = spring.entranceTy;
    spring.currentRz = spring.entranceRz;
    motionLoop();

    // nameplate is CSS-positioned at top:32px — no JS needed

    // panel data
    const PANELS = {
      about: {
        title: 'About me',
        iconClass: 'ic-about',
        icon: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>`,

    // alternating direction — starts right, flips each new open
    let nextSide = 'right';

    let activePanel = null;
    let activeSide = 'right';

    function openPanel(key) {
      const d = PANELS[key];
      if (!d) return;
      const panel = document.getElementById('panel');
      const title = document.getElementById('panelTitle');
      const body = document.getElementById('panelBody');
      const icon = document.getElementById('panelIcon');

      // desktop mode: same key = deselect/clear
      if (isDesktopMode()) {
        if (activePanel === key) {
          closePanel();
          return;
        }
        _doOpen(key, d, panel, title, body, icon);
        return;
      }

      // floating panel mode
      // same key = close (no direction change)
      if (activePanel === key && panel.classList.contains('open')) { closePanel(); return; }

      // switching panel while one is open — close, then open new one
      if (panel.classList.contains('open') && activePanel !== key) {
        panel.classList.remove('open');
        isPanelOpen = false;
        setTimeout(() => _doOpen(key, d, panel, title, body, icon), 200);
        return;
      }
      _doOpen(key, d, panel, title, body, icon);
    }

    function isDesktopMode() {
      return document.body.classList.contains('mode-desktop');
    }

    function _doOpen(key, d, panel, title, body, icon) {
      document.querySelectorAll('.app.active').forEach(a => a.classList.remove('active'));
      const appEl = document.getElementById('app-' + key);
      if (appEl) appEl.classList.add('active');
      activePanel = key;

      if (isDesktopMode()) {
        // inline content in dt-main — no floating panel, no phone movement
        _openDesktopInline(key, d);
        isPanelOpen = false; // don't shift phone
        panelSide = null;
        return;
      }

      const side = nextSide;
      nextSide = side === 'right' ? 'left' : 'right';
      activeSide = side;

      panel.classList.remove('side-right', 'side-left');
      panel.classList.add('side-' + side);

      title.textContent = d.title;
      body.innerHTML = d.html;
      icon.className = 'panel-icon ' + d.iconClass;
      icon.innerHTML = d.icon;
      body.scrollTop = 0;
      isPanelOpen = true;
      panelSide = side;

      requestAnimationFrame(() => requestAnimationFrame(() => {
        panel.classList.add('open');
      }));
    }

    function _openDesktopInline(key, d) {
      const main = document.getElementById('dtMain');
      if (!main) return;

      // build content safely without template literal conflicts
      const wrapper = document.createElement('div');
      wrapper.className = 'dt-content';

      const hdr = document.createElement('div');
      hdr.className = 'dt-header';

      const ico = document.createElement('div');
      ico.className = 'dt-header-icon ' + d.iconClass;
      ico.innerHTML = d.icon;

      const ttl = document.createElement('span');
      ttl.className = 'dt-header-title';
      ttl.textContent = d.title;

      hdr.appendChild(ico);
      hdr.appendChild(ttl);

      const body = document.createElement('div');
      body.className = 'dt-body';
      body.innerHTML = d.html;

      wrapper.appendChild(hdr);
      wrapper.appendChild(body);

      main.innerHTML = '';
      main.appendChild(wrapper);
    }

    function _clearDesktopInline() {
      const main = document.getElementById('dtMain');
      if (!main) return;
      main.innerHTML = `<div class="dt-empty" id="dtEmpty">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    <span>Select an item</span>
  </div>`;
    }

    function closePanel() {
      const panel = document.getElementById('panel');
      panel.classList.remove('open');
      isPanelOpen = false;
      panelSide = null;
      activePanel = null;
      document.querySelectorAll('.app.active').forEach(a => a.classList.remove('active'));
      if (isDesktopMode()) _clearDesktopInline();
    }

    // ── DEVICE SWITCHER ──
    let currentMode = 'phone';
    function switchDevice(mode, btn) {
      if (mode === currentMode) return;
      // close any open panels cleanly
      const panel = document.getElementById('panel');
      panel.classList.remove('open');
      isPanelOpen = false; panelSide = null; activePanel = null;
      document.querySelectorAll('.app.active').forEach(a => a.classList.remove('active'));
      _clearDesktopInline();

      currentMode = mode;
      document.body.classList.remove('mode-phone', 'mode-tablet', 'mode-desktop');
      document.body.classList.add('mode-' + mode);
      document.querySelectorAll('.dv-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      // reset phone position
      spring.targetTx = 0; spring.tx = 0; spring.vtx = 0;

    }

    function openSheet(key) {
      const d = SHEETS[key];
      if (!d) return;
      document.getElementById('sheetInner').innerHTML =
        `<div class="sheet-title">${d.title}</div><div class="sheet-sub">${d.sub}</div>${d.html}`;
      document.getElementById('sheetBg').classList.add('open');
      document.getElementById('sheet').classList.add('open');
    }

    function closeSheet() {
      document.getElementById('sheetBg').classList.remove('open');
      document.getElementById('sheet').classList.remove('open');
    }

    document.getElementById('sheetBg').addEventListener('click', function (e) {
      if (e.target === this) closeSheet();

    // desktop-only-nav: open links directly
    document.querySelectorAll('.desktop-only-nav[data-sheet]').forEach(el => {
      el.addEventListener('click', function (e) {

    document.querySelectorAll('.app[data-panel]').forEach(el => {
      el.addEventListener('click', function (e) {
        e.stopPropagation();
